<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
      #stage { position: fixed; inset: 0; }
      #gift {
        position: fixed; max-width: 220px; padding: 8px;
        background: rgba(255,255,255,0.95); border: 2px solid #e0a92a; border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.25); font: 14px -apple-system, system-ui, sans-serif;
        color: #222; transform: rotate(-3deg); pointer-events: none;
      }
      #giftImg { max-width: 200px; max-height: 200px; display: block; border-radius: 6px; }
      #giftNote { white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div id="gift" hidden>
      <img id="giftImg" hidden />
      <div id="giftNote" hidden></div>
    </div>
    <script src="./overlay.js"></script>
  </body>
</html>
